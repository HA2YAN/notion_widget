<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴나 탄생 디데이 위젯</title>
    <style>
        /* 위젯 전체 스타일 */
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; 
        }

        /* 디데이 카드 디자인 */
        .widget-container {
            text-align: center;
            padding: 20px 35px;
            /* 요청하신 배경색 적용 */
            background-color: #FFFA99; 
            border-radius: 24px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.05);
            border: 1px solid #f2ee8d; /* 배경색과 어울리는 옅은 테두리 */
        }

        /* 문구 변경: 뉴나탄생 */
        .title { 
            font-size: 15px; 
            color: #7d765a; /* 배경색에 맞춰 조금 더 선명한 갈색톤으로 조정 */
            margin-bottom: 6px; 
            font-weight: 600;
        }

        /* D+날짜: 기존 색상 유지 */
        .days { 
            font-size: 38px; 
            font-weight: 800; 
            color: #ff8787; 
            letter-spacing: -1px;
        }

        .date-detail {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.2);
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title">뉴나탄생</div>
        <div id="dday-result" class="days">D+0</div>
        <div class="date-detail">2019. 07. 18</div>
    </div>

    <script>
        // 탄생일 설정: 2019년 7월 18일
        const birthday = new Date("2019-07-18T00:00:00");
        const today = new Date();
        
        // 날짜 계산 (태어난 날을 1일로 포함)
        const diffTime = today - birthday;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        document.getElementById("dday-result").innerText = "D+" + diffDays;
    </script>
</body>
</html>
