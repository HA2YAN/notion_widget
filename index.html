<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>뉴나 탄생 디데이 위젯</title>
    <style>
        /* 위젯 전체 스타일 */
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple Color Emoji", sans-serif;
            background-color: transparent; 
        }

        /* 디데이 카드 디자인 */
        .widget-container {
            text-align: center;
            padding: 22px 40px;
            /* 요청하신 노란색 배경 */
            background-color: #FFFA99; 
            border-radius: 28px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #f2ee8d;
        }

        /* 문구 변경: 🎈뉴나탄생🎉 */
        .title { 
            font-size: 16px; 
            color: #7d765a; 
            margin-bottom: 8px; 
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px; /* 이모지와 글자 사이 간격 */
        }

        /* D+날짜: 기존 핑크색 유지 */
        .days { 
            font-size: 40px; 
            font-weight: 800; 
            color: #ff8787; 
            letter-spacing: -1.5px;
            line-height: 1.2;
        }

        .date-detail {
            font-size: 11px;
            color: rgba(0, 0, 0, 0.2);
            margin-top: 6px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title">🎈 뉴나탄생 🎉</div>
        <div id="dday-result" class="days">D+0</div>
        <div class="date-detail">2019. 07. 18</div>
    </div>

    <script>
        // 탄생일 설정: 2019년 7월 18일
        const birthday = new Date("2019-07-18T00:00:00");
        const today = new Date();
        
        // 날짜 계산 (태어난 날을 1일로 포함)
        const diffTime = today - birthday;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        document.getElementById("dday-result").innerText = "D+" + diffDays;
    </script>
