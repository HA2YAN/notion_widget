<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        body { 
            margin: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: transparent; /* 노션 배경과 어울리게 투명 설정 */
        }
        .container {
            text-align: center;
            padding: 15px 25px;
            background: #ffffff;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.05);
            border: 1px solid #f0f0f0;
        }
        .label { font-size: 14px; color: #888; margin-bottom: 8px; }
        .dday { font-size: 32px; font-weight: 800; color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">우리 아이 태어난 지</div>
        <div id="result" class="dday">D+0</div>
    </div>

    <script>
        // 여기에 아이의 실제 탄생일을 넣으세요 (연도-월-일)
        const birthday = new Date("2021-05-10"); 
        const today = new Date();
        
        // 날짜 계산 (시작일을 1일로 치려면 +1을 더하세요)
        const diffTime = today - birthday;
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        document.getElementById("result").innerText = "D+" + diffDays;
    </script>
</body>
</html>
