<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>아이 디데이 위젯</title>
    <style>
        /* 위젯 전체 스타일 (노션 배경과 어울리게) */
        body { 
            margin: 0; 
            padding: 0;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: transparent; /* 투명 배경 */
        }

        /* 디데이 카드의 디자인 */
        .widget-container {
            text-align: center;
            padding: 20px 30px;
            background-color: #ffffff;
            border-radius: 24px; /* 둥근 모서리 */
            box-shadow: 0 8px 16px rgba(0,0,0,0.06); /* 부드러운 그림자 */
            border: 1px solid #f1f3f5;
        }

        /* '우리 아이 태어난 지' 텍스트 */
        .title { 
            font-size: 14px; 
            color: #868e96; 
            margin-bottom: 8px; 
            font-weight: 500;
        }

        /* 'D+000' 날짜 텍스트 */
        .days { 
            font-size: 36px; 
            font-weight: 800; 
            color: #ff8787; /* 부드러운 핑크색 */
            letter-spacing: -1px;
        }

        /* '2019.07.18' 작은 날짜 */
        .date-detail {
            font-size: 11px;
            color: #adb5bd;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="widget-container">
        <div class="title">우리 아이 태어난 지</div>
        <div id="dday-result" class="days">D+0</div>
        <div class="date-detail">2019. 07. 18</div>
    </div>

    <script>
        // 탄생일 설정: 2019년 7월 18일
        const birthday = new Date("2019-07-18T00:00:00");
        const today = new Date();
        
        // 날짜 계산 (하루를 밀리초로 환산: 1000 * 60 * 60 * 24)
        const diffTime = today - birthday;
        // 태어난 날을 1일로 포함하여 계산 (+1)
        const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24)) + 1;
        
        // 화면에 결과 반영
        document.getElementById("dday-result").innerText = "D+" + diffDays;
    </script>
</body>
</html>
